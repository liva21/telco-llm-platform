<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telco Asistan</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 80vh;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            color: white;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header .status-dot {
            width: 10px;
            height: 10px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.4;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
            white-space: pre-wrap;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            background-color: #334155;
            color: #f8fafc;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }

        .message.user {
            background-color: #3b82f6;
            color: white;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }

        .tool-indicator {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 6px;
            font-style: italic;
        }

        .input-area {
            padding: 20px;
            background: rgba(30, 41, 59, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: #3b82f6;
        }

        .input-area button {
            padding: 0 20px;
            border-radius: 8px;
            background-color: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.1s;
        }

        .input-area button:hover {
            background-color: #2563eb;
        }

        .input-area button:active {
            transform: scale(0.95);
        }

        .input-area button:disabled {
            background-color: #475569;
            cursor: not-allowed;
            transform: none;
        }

        .typing {
            align-self: flex-start;
            padding: 12px 16px;
            background-color: #334155;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            display: none;
            gap: 4px;
            align-items: center;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background-color: #94a3b8;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite both;
        }

        .typing span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes typingBounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="header">
            <div class="status-dot"></div>
            Telco AI
        </div>
        <div class="chat-box" id="chatBox">
            <div class="message bot">Merhaba, ben Telco Asistan! Tüm telekomünikasyon operatörlerinden aldığınız internet, fatura veya altyapı hizmetlerindeki sorunlarınızı çözmek için buradayım. Size bugün nasıl yardımcı olabilirim?</div>
        </div>
        <div class="typing" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Mesajınızı yazın..." autocomplete="off">
            <button id="sendBtn">Gönder</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        
        let isFirstTurn = true;

        function appendMessage(text, sender, toolsHtml = "") {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerHTML = text + (toolsHtml ? `<div class="tool-indicator">${toolsHtml}</div>` : "");
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            sendBtn.disabled = true;
            typingIndicator.style.display = 'flex';
            chatBox.appendChild(typingIndicator);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: text,
                        phone: "5551234567",
                        region: "Istanbul",
                        is_first_turn: isFirstTurn
                    })
                });

                isFirstTurn = false;

                if (!response.ok) {
                    throw new Error("Sunucu hatasi");
                }

                const data = await response.json();
                typingIndicator.style.display = 'none';

                let toolsHtml = "";
                if (data.tool_calls && data.tool_calls.length > 0) {
                    const toolNames = data.tool_calls.map(tc => tc.name).join(', ');
                    toolsHtml = `<br>Kullanılan araçlar: <i>${toolNames}</i>`;
                }

                appendMessage(data.answer, 'bot', toolsHtml);
            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage("Üzgünüm, şu an bağlantı kuramıyorum. Lütfen daha sonra tekrar deneyin.", 'bot');
                console.error(error);
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>

</body>

</html>
